<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camorenergies</title>
  <script src="https://kit.fontawesome.com/69a0ca2395.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --theme-bg: #2651b0;
      --theme-bg-dark: #10224a;
      --theme-bg-2: rgb(38, 81, 176, 0.6);
      --theme-bg-dark-2: rgba(16, 34, 74, 0.7);
      --specific-bg: #3260c8;
    }

    body {
      padding: 0;
      margin: 0;
      font-family: helvetica, sans-serif;
      color: #fff;
      font-weight: 400;
    }

    a {
      text-decoration: none;
      color: #fff;
    }

    .container {
      position: relative;
      min-height: 100vh;
      background-image:
        linear-gradient(to right, var(--theme-bg-2), var(--theme-bg-2), var(--theme-bg-2), var(--theme-bg-2), var(--theme-bg-2), var(--theme-bg-dark-2)),
        linear-gradient(to right top, var(--theme-bg), var(--theme-bg), var(--theme-bg), var(--theme-bg), var(--theme-bg), var(--theme-bg-dark), var(--theme-bg-dark));
    }

    #dark-cover {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1;
      transition: display 0.5s ease-in-out;
    }

    #sm-top-line {
      display: none;
      position: absolute;
      left: 0;
      top: 79.46px;
      width: 100%;
      border: 1px solid var(--specific-bg);
    }

    #logo-parent {
      padding: 61px 0 0 80px;
    }

    #logo {
      width: 139px;
      height: 39px;
    }

    #main-msg {
      position: relative;
      max-width: 1072px;
      height: 513px;
      margin: 154px 0 0 80px;
      font-size: 64px;
      line-height: 100%;
      letter-spacing: -1%;
    }

    #main-msg>div:first-child {
      gap: 105px;
      margin-bottom: 105px;
    }

    #main-msg>div:nth-child(2) {
      color: #f4e751;
      height: 192px;
      gap: 72px;
    }

    @media (max-width: 857px) {
      #sm-top-line {
        display: block;
      }

      #logo-parent {
        padding: 113.46px 0 0 12px;
      }

      #logo {
        width: 83px;
        height: 23px;
      }

      #main-msg {
        margin: 127.46px 0 0 12px;
        max-width: 356px;
        height: 330px;
        font-size: 30px;
        line-height: 120%;
      }

      #main-msg>div:first-child {
        gap: 48px;
        margin-bottom: 48px;
      }

      #main-msg>div:nth-child(2) {
        height: 264px;
        gap: 48px;
      }
    }

    #construction-icon {
      position: absolute;
      top: 58.64px;
      right: 60px;
      width: 269px;
      height: 173px;
    }

    @media (max-width: 1198px) {
      #construction-icon {
        width: 150px;
        height: 96px;
        top: 58.64px;
        right: 60px;
      }
    }

    @media (max-width: 857px) {
      #construction-icon {
        width: 100px;
        height: 64px;
        top: 113px;
        right: 25px;
      }
    }

    #contacts-lg {
      position: absolute;
      bottom: 0;
      font-size: 32px;
      width: calc(100vw - 100px);
    }

    #contacts-lg>a {
      float: left;
      padding: 10px 40px;
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-bottom: 1px solid #fff;
      transition: background-color 0.5s;
    }

    .hover-arrow {
      margin-left: 8px;
      display: none;
    }

    #contacts-lg>a:hover .hover-arrow {
      display: inline-block;
    }

    #contacts-lg>a:hover {
      background: #f9eb58;
      color: var(--theme-bg);
      padding: 10px 20px;
    }

    #contacts-lg>a:first-child {
      border-left: none;
    }

    #contacts-sm {
      display: none;
      flex-wrap: nowrap;
      position: absolute;
      bottom: 0;
      width: calc(100vw - 100px);
    }

    @media (max-width: 1297px) {
      #contacts-lg {
        display: none;
      }

      #contacts-sm {
        display: flex;
      }
    }

    @media (max-width: 450px) {
      #contacts-sm {
        width: calc(100% - 15px);
      }
    }

    #contacts-sm>a {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: clamp(1.125rem, 1rem + 1vw, 2rem);
      color: #fff;
      width: 50.3%;
      box-sizing: border-box;
      border: 1px solid #fff;
    }

    #sm-dropdown {
      display: flex;
      justify-content: space-between;
      padding: 16px;
      width: 49.6%;
      height: inherit;
      box-sizing: border-box;
      border: 1px solid #fff;
    }

    .dropdown-icon {
      font-size: clamp(1.5rem, 1rem + 2vw, 3.5rem);
    }

    #sm-contact-details {
      position: fixed;
      top: calc(100vh + 40px);
      left: 0;
      width: 100%;
      background: var(--theme-bg);
      height: 534px;
      z-index: 4;
      transition: top 0.6s ease-in-out;
    }

    #sm-contact-details a {
      display: block;
      background: var(--specific-bg);
      padding: 20px;
      font-size: 18px;
      border-bottom: 1px solid #fff;
    }

    #sm-contact-details a:first-child {
      border-top: 1px solid #fff;
    }

    #bottom-slides {
      display: flex;
      flex-wrap: nowrap;
      margin: 107px 0 84px 0;
      overflow-x: scroll;
      scrollbar-width: none;
      /* Internet Explorer and Edge */
      -ms-overflow-style: none;
    }

    /* Chrome, Safari, and Opera */
    #bottom-slides::-webkit-scrollbar {
      display: none;
    }

    #bottom-slides>div {
      width: 322px;
      height: 389px;
      margin-right: 5px;
    }

    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 322px;
      height: 261px;
      background: var(--specific-bg);
      margin-bottom: 20px;
    }

    .slide-text {
      text-align: center;
      font-size: 28px;
    }

    @media (max-width: 670px) {
      #bottom-slides {
        margin-bottom: 24px;
      }

      #bottom-slides>div {
        width: 127px;
        height: 203.24px;
      }

      .icon {
        width: 127px;
        height: 127px;
      }

      .icon svg {
        width: 30px !important;
        height: auto !important;
      }

      .slide-text {
        font-size: 14px;
        line-height: 120%;
      }
    }

    #slider {
      display: flex;
      justify-content: end;
      padding: 0 40px 40px 0;
    }

    #slider button {
      height: 60px;
      width: 90px;
      border: 1px solid #fff;
      color: #fff;
      background: transparent;
      margin-right: 40px;
      overflow: none;
    }

    .arrow {
      font-size: 24px;
    }

    .disabled-btn {
      border-color: #838282 !important;
      color: #838282 !important;
    }

    @media (max-width: 670px) {
      #slider {
        padding: 0 16px 16px 0;
      }

      #slider button {
        height: 32px;
        width: 48px;
        margin-right: 17px;
      }

      .arrow {
        font-size: 16px;
      }
    }
  </style>

  let smDropdown = document.getElementById('sm-dropdown');
  let smContactDetails = document.getElementById('sm-contact-details');
  let darkCover = document.getElementById('dark-cover');

  smDropdown.addEventListener('click', () => {
    darkCover.style.display = 'block';
    smContactDetails.style.top = 'calc(100vh - 534px)';
  });

  darkCover.addEventListener('click', () => {
    darkCover.style.display = 'none';
    smContactDetails.style.top = 'calc(100vh + 40px)';
  });

  let lastScrollTop = window.scrollY || document.documentElement.scrollTop;

  window.addEventListener('scroll', function() {
    const currentScroll = window.scrollY || document.documentElement.scrollTop;

    if (!(currentScroll > lastScrollTop)) {
      darkCover.style.display = 'none';
      smContactDetails.style.top = 'calc(100vh + 40px)';
    }

    lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
  }, {
    passive: true
  });

  let lgContactLinks = document.querySelectorAll('#contacts-lg>a');

  let texts = [
    'Batteries for Cars, Trucks, Keke, & SUVs.',
    'Batteries for Inverters, Generators, & UPS.',
    'Batteries for Power banks, Lamps, & Torches.',
    'Batteries for Laptops & Cameras.',
    'Batteries for Rechargeable Fans.',
    'Batteries for Game, Toys, & Mouse',
    'Batteries for Clock, Watches, & Scales.',
    'Batteries for CCTV & Alarm System.',
    'Batteries for Streetlights& Emergency Lights.',
    'Batteries for Yatch & Marine.'
  ]

  let bottomSlides = document.getElementById('bottom-slides');

  for (let i = 0; i < texts.length; i++) {
    let icon = icons[i];
    let text = texts[i];

    bottomSlides.innerHTML += `
    <div>
      <div class="icon">
        ${icon}
      </div>
      <div class="slide-text">
        ${text}
      </div>
    </div>
    `;
  }

  let slideLeftButton = document.getElementById('slide-left');
  let slideRightButton = document.getElementById('slide-right');
  let bottomSlidesIcon = document.querySelector('#bottom-slides .icon');

  bottomSlides.addEventListener('scroll', () => {
    const xPosition = bottomSlides.scrollLeft;

    (xPosition == 0) ? slideLeftButton.style.display = 'none': slideLeftButton.style.display = 'inline-block';
    (xPosition >= bottomSlides.scrollWidth - bottomSlides.clientWidth) ? slideRightButton.classList.add('disabled-btn'): slideRightButton.classList.remove('disabled-btn');
  });

  window.addEventListener('resize', () => {
    if (bottomSlidesIcon.offsetWidth > 127) {
      slideLeftButton.onclick = () => {
        bottomSlides.scrollBy({
          left: -644,
          behavior: 'smooth'
        });
      };

      slideRightButton.onclick = () => {
        bottomSlides.scrollBy({
          left: 644,
          behavior: 'smooth'
        });
      };
    } else {
      slideLeftButton.onclick = () => {
        bottomSlides.scrollBy({
          left: -254,
          behavior: 'smooth'
        });
      };

      slideRightButton.onclick = () => {
        bottomSlides.scrollBy({
          left: 254,
          behavior: 'smooth'
        });
      };
    }
  })
</script>
